services:
  # PHP-FPM (Symfony)
  php:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: codyssey-php
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
    env_file:
      - .env.prod
    volumes:
      - app_build:/app/public/build
    networks:
      - codyssey_internal
      - web
    depends_on:
      database:
        condition: service_healthy

  # Nginx (serveur web)
  nginx:
    build:
      context: .
      dockerfile: nginx.dockerfile
    container_name: codyssey-nginx
    restart: unless-stopped
    volumes:
      - app_build:/app/public/build:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web
      - codyssey_internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.codyssey.rule=Host(`codyssey.plouzor.fr`)"
      - "traefik.http.routers.codyssey.entrypoints=web,websecure"
      - "traefik.http.routers.codyssey.tls.certresolver=le"
      - "traefik.http.services.codyssey.loadbalancer.server.port=80"
      - "traefik.docker.network=web"
    depends_on:
      - php

  # PostgreSQL
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: codyssey-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - codyssey_db_data:/var/lib/postgresql/data
    networks:
      - codyssey_internal

volumes:
  codyssey_db_data:
  app_build:

networks:
  web:
    external: true
    name: web
  codyssey_internal:
    internal: true
