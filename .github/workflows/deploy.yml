name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main
      - pre-prod
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_OVH_SSH_KEY }}

      - name: 📝 Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          BRANCH: ${{ github.ref_name }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e
            cd ${{ secrets.VPS_PATH }}
            
            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/${{ env.BRANCH }}
            
            echo "🧹 Removing old assets volume..."
            docker volume rm codyssey_app_build 2>/dev/null || true
            
            echo "🏗️  Building Docker images..."
            docker compose -f docker-compose.prod.yml build --no-cache
            
            echo "🔄 Restarting containers..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            
            echo "⏳ Waiting for containers to be ready..."
            sleep 15
            
            echo "🗄️  Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T php php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
            
            echo "🧹 Clearing cache..."
            docker compose -f docker-compose.prod.yml exec -T php php bin/console cache:clear --env=prod --no-warmup
            docker compose -f docker-compose.prod.yml exec -T php php bin/console cache:warmup --env=prod
            
            echo "🧼 Cleaning up Docker..."
            docker system prune -f
            
            echo "✅ Deployment complete!"
          ENDSSH

      - name: ✅ Deployment Success
        if: success()
        run: |
          echo "🎉 Successfully deployed to production!"
          echo "🌐 App is live at https://codyssey.plouzor.fr"

      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "💥 Deployment failed! Check the logs above."
          exit 1
